<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zeeshan Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📝 Notes App</h1>

  <div class="container">
    <textarea id="noteInput" placeholder="Write your note..."></textarea>
    <button onclick="addNote()">Add Note</button>

    <input type="text" id="search" placeholder="Search notes..." onkeyup="searchNotes()">

    <div id="notes"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
