<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeeshan | Web Developer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>Zeeshan</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Hello, I'm Zeeshan 👋</h2>
        <p>Web Developer | CSE Student</p>
        <button>Hire Me</button>
    </section>

    <!-- About -->
    <section id="about" class="about">
        <h2>About Me</h2>
        <p>
            I am a passionate web developer who loves building modern websites.
            Currently pursuing B.Tech in CSE (IoT).
        </p>
    </section>

    <!-- Projects -->
    <section id="projects" class="projects">
        <h2>My Projects</h2>

        <div class="project-container">
            <div class="card">Project 1</div>
            <div class="card">Project 2</div>
            <div class="card">Project 3</div>
        </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="contact">
        <h2>Contact Me</h2>
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea placeholder="Your Message"></textarea>
        <button>Send</button>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Zeeshan Portfolio</p>
    </footer>

</body>
</html>
